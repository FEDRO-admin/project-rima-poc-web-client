@if (store.active()) {
  <div class="create-container" role="dialog" (keydown.escape)="onEscape()">
    <div class="create-card">
      <div class="create-header">
        <calcite-icon icon="plus-circle" scale="s"></calcite-icon>
        <span class="create-header-title">Create Feature</span>
        <span class="create-header-spacer"></span>
        <button class="create-header-btn create-close" (click)="requestClose()" aria-label="Close create panel">
          ✕
        </button>
      </div>

      <div class="create-body">
        @if (store.layer()) {
          <div class="create-layer-info">
            <span class="create-layer-name">{{ store.layer()!.title }}</span>
            @if (store.subtypeValue() != null) {
              <span class="create-layer-type">Type: {{ store.subtypeValue() }}</span>
            }
          </div>
          <rima-create-form [layer]="store.layer()!" />
        }
      </div>
    </div>

    @if (showCloseConfirm()) {
      <rima-confirm-dialog
        title="Discard Changes"
        message="You have unsaved changes. Are you sure you want to close?"
        confirmLabel="Discard"
        cancelLabel="Keep Editing"
        (confirmed)="onCloseConfirm($event)"
      />
    }
  </div>
}
