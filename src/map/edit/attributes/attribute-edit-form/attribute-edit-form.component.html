<div class="edit-form">
  <div class="edit-form-header">
    <calcite-icon icon="pencil" scale="s"></calcite-icon>
    <span class="edit-form-title">Edit Feature</span>
  </div>

  <rima-attribute-form
    [fields]="fields()"
    [values]="attributeEditStore.editedAttributes()"
    [disabled]="attributeEditStore.saving()"
    idPrefix="edit"
    (fieldChange)="onAttributeFieldChange($event)"
  />

  <div class="edit-form-actions">
    <button class="edit-btn edit-btn--cancel" (click)="requestCancel()" [disabled]="attributeEditStore.saving()">
      Cancel
    </button>
    <button class="edit-btn edit-btn--save" (click)="requestSave()" [disabled]="attributeEditStore.saving()">
      @if (attributeEditStore.saving()) {
        Saving...
      } @else {
        Save
      }
    </button>
  </div>
</div>

@if (confirmAction() === 'save') {
  <rima-confirm-dialog
    title="Save Changes"
    message="Are you sure you want to save the changes to this feature?"
    confirmLabel="Save"
    cancelLabel="Cancel"
    (confirmed)="onConfirm($event)"
  />
}

@if (confirmAction() === 'cancel') {
  <rima-confirm-dialog
    title="Discard Changes"
    message="You have unsaved changes. Are you sure you want to discard them?"
    confirmLabel="Discard"
    cancelLabel="Keep Editing"
    (confirmed)="onConfirm($event)"
  />
}
