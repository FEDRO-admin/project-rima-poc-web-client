<div class="geometry-edit-form">
  @if (store.sketchActive()) {
    <div class="geometry-sketch-controls">
      <span class="geometry-status">Editing geometry...</span>
      <div class="geometry-tools">
        <button class="geometry-tool-btn" (click)="undo()" [disabled]="!store.canUndo()" title="Undo">
          <calcite-icon icon="undo" scale="s"></calcite-icon>
        </button>
        <button class="geometry-tool-btn" (click)="redo()" [disabled]="!store.canRedo()" title="Redo">
          <calcite-icon icon="redo" scale="s"></calcite-icon>
        </button>
      </div>
    </div>
  } @else {
    <button class="geometry-edit-btn" (click)="reenterSketch()">
      <calcite-icon icon="vertex-edit" scale="s"></calcite-icon>
      Continue Editing
    </button>
  }

  <div class="geometry-actions">
    <button class="geometry-btn geometry-btn--cancel" (click)="cancel()" [disabled]="store.saving()">Cancel</button>
    <button class="geometry-btn geometry-btn--save" (click)="save()" [disabled]="store.saving() || !store.isDirty()">
      @if (store.saving()) {
        Saving...
      } @else {
        Save Geometry
      }
    </button>
  </div>
</div>
