<div class="map-container">
  <rima-create-panel></rima-create-panel>
  <rima-popup></rima-popup>
  <div class="map-area">
    <arcgis-map id="rima-map" #arcgisMap [extent]="switzerlandExtent"></arcgis-map>
    @if (!createEffects.creating() && !editEffects.editing()) {
      <button class="create-fab" (click)="onCreateClick()" aria-label="Create new feature" title="Create new feature">
        <calcite-icon icon="plus" scale="m"></calcite-icon>
      </button>
    }
  </div>
  <rima-toc></rima-toc>
</div>
